<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Join the Waitlist · LoadScan</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="description" content="Join the LoadScan waitlist to hear when the app is available."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #080A0F;
      --surface: #0D1117;
      --border:  rgba(255,255,255,0.07);
      --blue:    #3B6EFF;
      --text:    #F0F2F7;
      --muted:   rgba(240,242,247,0.48);
      --faint:   rgba(240,242,247,0.26);
      --max:     960px;
      --pad:     24px;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      color: var(--text); background: var(--bg);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }

    /* Scan-line texture */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.018) 0px,
        rgba(255,255,255,0.018) 1px,
        transparent 1px,
        transparent 5px
      );
      pointer-events: none; z-index: 0;
    }
    .scan-beam {
      position: fixed; left: 0; right: 0; top: 0; height: 220px;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(59,110,255,0.025) 35%,
        rgba(59,110,255,0.07)  47%,
        rgba(100,160,255,0.16) 50%,
        rgba(59,110,255,0.07)  53%,
        rgba(59,110,255,0.025) 65%,
        transparent 100%
      );
      pointer-events: none; z-index: 0;
      animation: scanDown 12s linear infinite;
    }
    @keyframes scanDown {
      0%   { transform: translateY(-220px); }
      100% { transform: translateY(100vh); }
    }

    nav, main, footer { position: relative; z-index: 1; }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,10,15,0.85);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: var(--max); margin: 0 auto; padding: 0 var(--pad);
      height: 58px; display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { display: flex; align-items: center; gap: 9px; text-decoration: none; }
    .nav-mark {
      width: 28px; height: 28px; background: var(--blue); border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-mark svg { width: 15px; height: 15px; }
    .nav-wordmark { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 16px; color: var(--text); letter-spacing: -0.03em; }
    .nav-back {
      font-size: 13.5px; font-weight: 500; color: var(--muted); text-decoration: none;
      display: flex; align-items: center; gap: 6px;
      padding: 6px 13px; border-radius: 8px; border: 1px solid var(--border);
      transition: color .15s, border-color .15s;
    }
    .nav-back:hover { color: var(--text); border-color: rgba(255,255,255,0.18); }
    .nav-back svg { width: 14px; height: 14px; }

    /* ── MAIN ── */
    main {
      max-width: 480px; margin: 0 auto;
      padding: 96px var(--pad) 100px;
    }

    .page-label {
      font-size: 11.5px; font-weight: 500; letter-spacing: 0.04em;
      color: var(--muted); text-transform: uppercase;
      margin-bottom: 20px; display: block;
    }

    h1 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 38px; line-height: 1.06; letter-spacing: -0.04em;
      margin-bottom: 14px; color: var(--text);
    }

    .lede {
      font-size: 16px; font-weight: 300; color: var(--muted);
      margin-bottom: 40px; line-height: 1.68;
    }

    /* ── FORM ── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
    }

    label {
      display: block; font-size: 12.5px; font-weight: 500;
      color: var(--muted); margin-bottom: 8px; letter-spacing: 0.01em;
    }

    input[type="email"] {
      width: 100%; padding: 12px 14px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 9px; font-size: 15px; font-family: 'Inter', sans-serif;
      color: var(--text); outline: none; margin-bottom: 12px;
      transition: border-color .15s, box-shadow .15s;
    }
    input[type="email"]::placeholder { color: var(--faint); }
    input[type="email"]:focus {
      border-color: rgba(59,110,255,0.55);
      box-shadow: 0 0 0 3px rgba(59,110,255,0.12);
    }

    .honeypot { position: absolute; left: -9999px; opacity: 0; pointer-events: none; }

    button {
      width: 100%; padding: 13px;
      background: var(--blue); color: #fff; border: none; border-radius: 9px;
      font-size: 14.5px; font-weight: 500; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: opacity .15s;
      letter-spacing: -0.01em;
    }
    button:hover { opacity: 0.88; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .message {
      margin-top: 14px; padding: 11px 14px; border-radius: 9px;
      font-size: 13.5px; line-height: 1.55; display: none;
    }
    .message.error  { background: rgba(220,38,38,0.1);  color: #F87171; border: 1px solid rgba(220,38,38,0.25); }
    .message.success { background: rgba(52,211,153,0.08); color: #34D399; border: 1px solid rgba(52,211,153,0.2); }

    .form-note {
      margin-top: 14px; font-size: 12px; color: var(--faint); line-height: 1.65;
    }
    .form-note a { color: var(--muted); text-decoration: underline; text-underline-offset: 2px; }
    .form-note a:hover { color: var(--text); }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border); padding: 32px var(--pad);
    }
    .footer-inner {
      max-width: var(--max); margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 14px;
    }
    .footer-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .footer-mark { width: 22px; height: 22px; background: var(--blue); border-radius: 5px; display: flex; align-items: center; justify-content: center; }
    .footer-mark svg { width: 11px; height: 11px; }
    .footer-name { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 14px; color: var(--text); letter-spacing: -0.03em; }
    .footer-links { display: flex; gap: 20px; list-style: none; flex-wrap: wrap; }
    .footer-links a { font-size: 13px; color: var(--muted); text-decoration: none; transition: color .15s; }
    .footer-links a:hover { color: var(--text); }
    .footer-copy { width: 100%; font-size: 12px; color: var(--faint); }

    @media (max-width: 540px) {
      h1 { font-size: 30px; }
    }
  </style>
</head>
<body>

<div class="scan-beam" aria-hidden="true"></div>

<nav>
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <div class="nav-mark">
        <svg viewBox="0 0 24 24" fill="none">
          <path stroke="white" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" d="M7.5 4L4 4L4 7.5M16.5 4L20 4L20 7.5M7.5 20L4 20L4 16.5M16.5 20L20 20L20 16.5"/>
          <rect x="5.5" y="7.8" width="1.9" height="8.4" rx="0.3" fill="white"/>
          <rect x="7.6" y="8.7" width="0.7" height="6.6" rx="0.2" fill="white" opacity="0.82"/>
          <rect x="8.5" y="7.8" width="1.4" height="8.4" rx="0.3" fill="white"/>
          <rect x="10.1" y="8.7" width="0.7" height="6.6" rx="0.2" fill="white" opacity="0.82"/>
          <rect x="11.0" y="7.8" width="1.9" height="8.4" rx="0.3" fill="white"/>
          <rect x="13.1" y="8.7" width="0.7" height="6.6" rx="0.2" fill="white" opacity="0.82"/>
          <rect x="14.0" y="7.8" width="1.4" height="8.4" rx="0.3" fill="white"/>
          <rect x="15.6" y="8.7" width="0.7" height="6.6" rx="0.2" fill="white" opacity="0.82"/>
          <rect x="16.5" y="7.8" width="1.9" height="8.4" rx="0.3" fill="white"/>
        </svg>
      </div>
      <span class="nav-wordmark">LoadScan</span>
    </a>
    <a href="/" class="nav-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </a>
  </div>
</nav>

<main>
  <span class="page-label">LoadScan Waitlist</span>
  <h1>Be first to know when LoadScan is live.</h1>
  <p class="lede">Enter your email and we'll reach out when the app is ready.</p>

  <div class="form-card">
    <form id="waitlist-form">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required />
      <input type="text" id="website" name="website" class="honeypot" tabindex="-1" autocomplete="off" />
      <button id="submit-btn" type="submit">Join Waitlist</button>
      <div id="message" class="message"></div>
    </form>
    <p class="form-note">No spam. We'll only email you about LoadScan. See our <a href="/privacy">Privacy Policy</a>.</p>
  </div>
</main>

<footer>
  <div class="footer-inner">
    <a href="/" class="footer-logo">
      <div class="footer-mark">
        <svg viewBox="0 0 24 24" fill="none">
          <path stroke="white" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" d="M7.5 4L4 4L4 7.5M16.5 4L20 4L20 7.5M7.5 20L4 20L4 16.5M16.5 20L20 20L20 16.5"/>
          <rect x="8" y="8" width="1.6" height="8" rx="0.3" fill="white"/>
          <rect x="10" y="9" width="0.7" height="6" rx="0.2" fill="white" opacity="0.8"/>
          <rect x="11" y="8" width="1.2" height="8" rx="0.3" fill="white"/>
          <rect x="12.6" y="9" width="0.7" height="6" rx="0.2" fill="white" opacity="0.8"/>
          <rect x="13.6" y="8" width="1.6" height="8" rx="0.3" fill="white"/>
        </svg>
      </div>
      <span class="footer-name">LoadScan</span>
    </a>
    <ul class="footer-links">
      <li><a href="privacy.html">Privacy</a></li>
      <li><a href="terms.html">Terms</a></li>
      <li><a href="mailto:support@load-scan.com">Support</a></li>
    </ul>
    <p class="footer-copy">© 2026 LoadScan. All rights reserved.</p>
  </div>
</footer>

<script>
  const WAITLIST_FUNCTION_URL = "https://xtukjyzrhcqvzkakmqsr.supabase.co/functions/v1/join-waitlist";
  const form = document.getElementById("waitlist-form");
  const emailInput = document.getElementById("email");
  const websiteInput = document.getElementById("website");
  const button = document.getElementById("submit-btn");
  const message = document.getElementById("message");

  function showMessage(text, type) {
    message.textContent = text;
    message.className = "message " + type;
    message.style.display = "block";
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();

    const email = emailInput.value.trim();
    if (!email) {
      showMessage("Enter your email address to join the waitlist.", "error");
      return;
    }

    button.disabled = true;
    button.textContent = "Saving…";
    message.style.display = "none";

    try {
      const response = await fetch(WAITLIST_FUNCTION_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email,
          website: websiteInput.value,
          source: "waitlist_page",
          referrer: window.location.href,
        }),
      });

      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.error || "We couldn't save your email right now.");
      }

      if (data.alreadyJoined) {
        showMessage("You're already on the list. We'll email you when LoadScan is ready.", "success");
      } else {
        showMessage("You're on the waitlist. We'll reach out when LoadScan is live.", "success");
        form.reset();
      }
    } catch (error) {
      showMessage(error.message || "We couldn't save your email right now.", "error");
    } finally {
      button.disabled = false;
      button.textContent = "Join Waitlist";
    }
  });
</script>
</body>
</html>

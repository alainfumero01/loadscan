<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password · LoadScan</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #F0F2F8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      color: #111520;
    }
    .card {
      background: #fff;
      border: 1px solid #DDE3F0;
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(12,19,64,0.08);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 32px;
    }
    .logo-mark {
      width: 36px;
      height: 36px;
      background: linear-gradient(to bottom, #2556DB, #1540B0);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .logo-name {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #2550DB;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #DDE3F0;
      border-radius: 10px;
      font-size: 15px;
      color: #111520;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }
    input[type="password"]:focus { border-color: #2550DB; }
    button {
      width: 100%;
      padding: 14px;
      background: #0C1340;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.88; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .message {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.5;
      display: none;
    }
    .message.error { background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA; }
    .message.success { background: #F0FDF4; color: #16A34A; border: 1px solid #BBF7D0; }
    .divider { border: none; border-top: 1px solid #EEF1F8; margin: 24px 0; }
    .hint { font-size: 13px; color: #9CA3AF; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" width="24" height="24">
          <path stroke="white" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" d="M7.5 4 L4 4 L4 7.5 M16.5 4 L20 4 L20 7.5 M7.5 20 L4 20 L4 16.5 M16.5 20 L20 20 L20 16.5"/>
          <rect x="5.5" y="7.8" width="1.9" height="8.4" rx="0.3" fill="white"/>
          <rect x="7.6" y="8.7" width="0.7" height="6.6" rx="0.2" fill="white" opacity="0.82"/>
          <rect x="8.5" y="7.8" width="1.4" height="8.4" rx="0.3" fill="white"/>
          <rect x="10.1" y="8.7" width="0.7" height="6.6" rx="0.2" fill="white" opacity="0.82"/>
          <rect x="11.0" y="7.8" width="1.9" height="8.4" rx="0.3" fill="white"/>
          <rect x="13.1" y="8.7" width="0.7" height="6.6" rx="0.2" fill="white" opacity="0.82"/>
          <rect x="14.0" y="7.8" width="1.4" height="8.4" rx="0.3" fill="white"/>
          <rect x="15.6" y="8.7" width="0.7" height="6.6" rx="0.2" fill="white" opacity="0.82"/>
          <rect x="16.5" y="7.8" width="1.9" height="8.4" rx="0.3" fill="white"/>
        </svg>
      </div>
      <span class="logo-name">LoadScan</span>
    </div>

    <div id="form-view">
      <p class="eyebrow">Password Reset</p>
      <h1>Set a new password</h1>

      <label for="password">New password</label>
      <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password"/>

      <label for="confirm">Confirm password</label>
      <input type="password" id="confirm" placeholder="Repeat password" autocomplete="new-password"/>

      <button id="submit-btn" onclick="handleReset()">Update Password</button>
      <div id="message" class="message"></div>

      <hr class="divider"/>
      <p class="hint">After updating, go back to the LoadScan app and sign in with your new password.</p>
    </div>

    <div id="success-view" style="display:none; text-align:center;">
      <div style="font-size:48px; margin-bottom:16px;">✓</div>
      <h1 style="margin-bottom:12px;">Password updated</h1>
      <p style="font-size:15px; color:#4B5563; line-height:1.7;">Open the LoadScan app and sign in with your new password.</p>
    </div>
  </div>

  <script>
    // Parse the access_token from the URL hash that Supabase appends after verifying the link
    const SUPABASE_URL = "https://xtukjyzrhcqvzkakmqsr.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0dWtqeXpyaGNxdnprYWttcXNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MTg4NzAsImV4cCI6MjA4ODk5NDg3MH0.GyvgvFyLDalNqEUxBrNwumBec26g1m3oMtVb5Qe8H34";

    function parseHash() {
      const hash = window.location.hash.substring(1);
      const params = {};
      hash.split("&").forEach(p => {
        const [k, v] = p.split("=");
        if (k) params[decodeURIComponent(k)] = decodeURIComponent(v || "");
      });
      return params;
    }

    const hashParams = parseHash();
    const accessToken = hashParams["access_token"];

    if (!accessToken) {
      showMessage("This link is invalid or has expired. Request a new password reset from the app.", "error");
      document.getElementById("submit-btn").disabled = true;
    }

    function showMessage(text, type) {
      const el = document.getElementById("message");
      el.textContent = text;
      el.className = "message " + type;
      el.style.display = "block";
    }

    async function handleReset() {
      const pw = document.getElementById("password").value;
      const confirm = document.getElementById("confirm").value;

      if (pw.length < 8) return showMessage("Password must be at least 8 characters.", "error");
      if (pw !== confirm) return showMessage("Passwords don't match.", "error");

      const btn = document.getElementById("submit-btn");
      btn.disabled = true;
      btn.textContent = "Updating…";

      try {
        const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${accessToken}`,
          },
          body: JSON.stringify({ password: pw }),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.message || data.error_description || "Update failed.");

        document.getElementById("form-view").style.display = "none";
        document.getElementById("success-view").style.display = "block";
      } catch (err) {
        showMessage(err.message, "error");
        btn.disabled = false;
        btn.textContent = "Update Password";
      }
    }

    document.addEventListener("keydown", e => {
      if (e.key === "Enter") handleReset();
    });
  </script>
</body>
</html>
